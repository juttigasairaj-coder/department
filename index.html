<!DOCTYPE html>
<html>

<head>
<title>Vignan Faculty Library</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="login-body">

<div class="login-container">

<img src="logo.png" class="logo">

<h3 class="mt-3">Faculty Library Login</h3>

<input id="username" class="form-control mt-3" placeholder="Username">

<input type="password" id="password" class="form-control mt-2" placeholder="Password">

<button class="btn btn-primary mt-3 w-100" onclick="login()">Login</button>

<p id="error" class="text-danger mt-2"></p>

</div>

<script src="script.js"></script>

</body>
</html>
