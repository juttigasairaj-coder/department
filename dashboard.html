<!DOCTYPE html>
<html>

<head>

<title>Library Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">Vignan Department Library</span>

<div>
<button class="btn btn-light" onclick="history.back()">⬅ Back</button>
<button class="btn btn-light" onclick="history.forward()">➡ Forward</button>
</div>

</div>

</nav>

<div class="container mt-4">

<h4>Borrow Book</h4>

<div class="row">

<div class="col">
<input id="facultyName" class="form-control" placeholder="Faculty Name">
</div>

<div class="col">
<input id="mobile" class="form-control" placeholder="Mobile Number">
</div>

<div class="col">
<select id="bookSelect" class="form-control"></select>
</div>

<div class="col">
<button class="btn btn-success" onclick="borrowBook()">Borrow</button>
</div>

</div>

<hr>

<h4>Available Books</h4>
<table class="table table-bordered" id="availableTable"></table>

<h4>Borrowed Books</h4>
<table class="table table-bordered" id="borrowedTable"></table>

<h4>Delayed Books</h4>
<table class="table table-bordered" id="delayedTable"></table>

<h4>Borrow History</h4>
<table class="table table-bordered" id="historyTable"></table>

</div>

<script src="script.js"></script>

</body>
</html>
